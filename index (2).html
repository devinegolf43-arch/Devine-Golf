<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devine Golf</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Welcome to Devine Golf</h1>
    <div id="product-list">
        <!-- Dynamic product items will be added here -->
    </div>
    <div id="cart">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        <button id="checkout-button">Checkout</button>
        <p>Total: <span id="total-price">$0.00</span></p>
    </div>
    <script>
        const stripe = Stripe('your-publishable-key-here');
        let cart = [];

        function addToCart(product) {
            cart.push(product);
            updateCart();
        }

        function updateCart() {
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.textContent = `${item.name} - $${item.price}`;
                cartItemsContainer.appendChild(itemDiv);
                total += item.price;
            });

            document.getElementById('total-price').textContent = `$${total.toFixed(2)}`;
        }

        document.getElementById('checkout-button').addEventListener('click', async () => {
            const { error } = await stripe.redirectToCheckout({
                lineItems: cart.map(item => ({ price: item.id, quantity: 1 })),
                mode: 'payment',
                successUrl: 'https://your-success-url.com',
                cancelUrl: 'https://your-cancel-url.com',
            });
            if (error) {
                console.error('Checkout error:', error);
            }
        });

        // Example products
        const products = [
            { id: 'prod_1', name: 'Golf Ball Set', price: 30 },
            { id: 'prod_2', name: 'Golf Club', price: 150 },
        ];

        products.forEach(product => {
            const productDiv = document.createElement('div');
            productDiv.innerHTML = `<h3>${product.name}</h3><p>Price: $${product.price}</p><button onclick='addToCart(${JSON.stringify(product)})'>Add to Cart</button>`;
            document.getElementById('product-list').appendChild(productDiv);
        });
    </script>
</body>
</html>
